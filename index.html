<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Welcome - Kawaii Ai アイシテル合同会社</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Zen+Maru+Gothic:wght@400;700;900&display=swap');

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, #e3f2fd 0%, #bbdefb 30%, #e1f5fe 60%, #fff 100%);
      font-family: 'Zen Maru Gothic', sans-serif;
      overflow: hidden;
      position: relative;
    }

    /* floating particles */
    .hearts-container {
      position: fixed;
      top: 0; left: 0; width: 100%; height: 100%;
      pointer-events: none;
      z-index: 0;
    }

    .heart {
      position: absolute;
      font-size: 1.5rem;
      animation: floatUp linear infinite;
      opacity: 0.6;
    }

    @keyframes floatUp {
      0% { transform: translateY(100vh) rotate(0deg) scale(0.5); opacity: 0; }
      10% { opacity: 0.6; }
      90% { opacity: 0.6; }
      100% { transform: translateY(-10vh) rotate(360deg) scale(1.2); opacity: 0; }
    }

    /* sparkle particles */
    .sparkle {
      position: absolute;
      width: 6px; height: 6px;
      background: #90caf9;
      border-radius: 50%;
      animation: sparkle 2s ease-in-out infinite;
      pointer-events: none;
    }

    @keyframes sparkle {
      0%, 100% { opacity: 0; transform: scale(0); }
      50% { opacity: 1; transform: scale(1); }
    }

    .main-content {
      position: relative;
      z-index: 1;
      text-align: center;
      padding: 2rem;
    }

    .logo-circle {
      width: 120px; height: 120px;
      background: linear-gradient(135deg, #64b5f6, #e1f5fe);
      border-radius: 50%;
      margin: 0 auto 2rem;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 3rem;
      box-shadow: 0 8px 32px rgba(100, 181, 246, 0.5);
      animation: pulse 2s ease-in-out infinite, fadeSlideIn 1s ease-out;
    }

    @keyframes pulse {
      0%, 100% { transform: scale(1); box-shadow: 0 8px 32px rgba(100, 181, 246, 0.5); }
      50% { transform: scale(1.05); box-shadow: 0 12px 48px rgba(66, 165, 245, 0.7); }
    }

    @keyframes fadeSlideIn {
      0% { opacity: 0; transform: translateY(30px) scale(0.8); }
      100% { opacity: 1; transform: translateY(0) scale(1); }
    }

    .company-name {
      font-size: clamp(1.5rem, 5vw, 2.8rem);
      font-weight: 900;
      background: linear-gradient(135deg, #1565c0, #42a5f5, #0d47a1);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: 0.5rem;
      animation: fadeSlideIn 1s ease-out 0.3s both;
      line-height: 1.4;
    }

    .thank-you {
      font-size: clamp(1.2rem, 4vw, 2rem);
      font-weight: 700;
      color: #1976d2;
      margin-bottom: 2rem;
      animation: fadeSlideIn 1s ease-out 0.5s both;
    }

    .welcome-message {
      font-size: clamp(1.1rem, 3.5vw, 1.8rem);
      font-weight: 700;
      color: #1e88e5;
      animation: fadeSlideIn 1s ease-out 0.7s both;
      position: relative;
    }

    .welcome-message::after {
      content: '';
      display: block;
      width: 0;
      height: 3px;
      background: linear-gradient(90deg, #90caf9, #42a5f5, #90caf9);
      margin: 0.8rem auto 0;
      border-radius: 2px;
      animation: expandLine 1.5s ease-out 1.2s both;
    }

    @keyframes expandLine {
      0% { width: 0; }
      100% { width: 80%; }
    }

    .ribbon {
      position: fixed;
      top: 0; left: 0; right: 0;
      height: 4px;
      background: linear-gradient(90deg, #64b5f6, #e1f5fe, #42a5f5, #bbdefb);
      background-size: 200% 100%;
      animation: shimmer 3s linear infinite;
    }

    .ribbon-bottom {
      top: auto; bottom: 0;
    }

    @keyframes shimmer {
      0% { background-position: 0% 0; }
      100% { background-position: 200% 0; }
    }
  </style>
</head>
<body>
  <div class="ribbon"></div>
  <div class="ribbon ribbon-bottom"></div>

  <div class="hearts-container" id="hearts"></div>

  <div class="main-content">
    <div class="logo-circle">&#x1F499;</div>
    <div class="thank-you">ありがとう</div>
    <div class="company-name">Kawaii Ai アイシテル合同会社</div>
    <div class="welcome-message">きらたん、ようこそ！</div>
  </div>

  <script>
    const heartsContainer = document.getElementById('hearts');
    const emojis = ['\uD83D\uDC99', '\u2728', '\uD83E\uDDE1', '\uD83C\uDF1F', '\uD83C\uDF0A', '\u2744\uFE0F', '\uD83E\uDDD6', '\uD83D\uDCA0', '\uD83D\uDD35'];

    function createHeart() {
      const heart = document.createElement('div');
      heart.className = 'heart';
      heart.textContent = emojis[Math.floor(Math.random() * emojis.length)];
      heart.style.left = Math.random() * 100 + '%';
      heart.style.animationDuration = (6 + Math.random() * 8) + 's';
      heart.style.animationDelay = Math.random() * 2 + 's';
      heart.style.fontSize = (1 + Math.random() * 1.5) + 'rem';
      heartsContainer.appendChild(heart);
      setTimeout(() => heart.remove(), 16000);
    }

    for (let i = 0; i < 15; i++) {
      setTimeout(createHeart, i * 300);
    }
    setInterval(createHeart, 800);

    function createSparkle() {
      const sparkle = document.createElement('div');
      sparkle.className = 'sparkle';
      const angle = Math.random() * Math.PI * 2;
      const radius = 100 + Math.random() * 200;
      const cx = window.innerWidth / 2;
      const cy = window.innerHeight / 2 - 50;
      sparkle.style.left = (cx + Math.cos(angle) * radius) + 'px';
      sparkle.style.top = (cy + Math.sin(angle) * radius) + 'px';
      sparkle.style.animationDelay = Math.random() * 2 + 's';
      sparkle.style.background = ['#90caf9', '#64b5f6', '#42a5f5', '#bbdefb', '#e1f5fe'][Math.floor(Math.random() * 5)];
      document.body.appendChild(sparkle);
      setTimeout(() => sparkle.remove(), 4000);
    }

    for (let i = 0; i < 20; i++) {
      setTimeout(createSparkle, i * 200);
    }
    setInterval(createSparkle, 300);
  </script>
</body>
</html>
